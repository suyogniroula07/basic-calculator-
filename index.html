<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="Calculator">
    <input type="text" id="display" readonly placeholder="0">

    <div id="keys">
        <button id="clear" class="clear">C</button>
        <button id="brackets" class="operator-btn">()</button>
        <button id="percent" class="operator-btn">%</button>
        <button id="divide" class="operator-btn">/</button>

        <button id="btn7">7</button>
        <button id="btn8">8</button>
        <button id="btn9">9</button>
        <button id="multiply" class="operator-btn">*</button>

        <button id="btn4">4</button>
        <button id="btn5">5</button>
        <button id="btn6">6</button>
        <button id="minus" class="operator-btn">-</button>

        <button id="btn1">1</button>
        <button id="btn2">2</button>
        <button id="btn3">3</button>
        <button id="plus" class="operator-btn">+</button>

        <button id="btn0">0</button>
        <button id="dot">.</button>
        <button id="equal" class="equal">=</button>
        <button id="delete" class="clear">⌫</button>
    </div>
</div>

</body>
<script src="script.js"></script>
</html>
